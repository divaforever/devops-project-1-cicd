<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Support Germany - World Cup 2026</title>
    <style>
        :root {
            --germany-black: #111111;
            --germany-red: #DD0000;
            --germany-gold: #FFCC00;
            --light-bg: #F9F9F9;
        }

        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-bg);
            color: #111111;
            text-align: center;
        }

        /* Top German Flag Border */
        .flag-bar {
            height: 15px;
            display: flex;
        }
        .bar-black { flex: 1; background-color: var(--germany-black); }
        .bar-red { flex: 1; background-color: var(--germany-red); }
        .bar-gold { flex: 1; background-color: var(--germany-gold); }

        /* Main Support Banner */
        .support-banner {
            background-color: var(--germany-black);
            color: white;
            padding: 60px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .support-banner h1 {
            font-size: 3.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .support-banner h1 span {
            color: var(--germany-gold);
        }

        .support-banner p {
            font-family: Arial, sans-serif;
            font-size: 1.5rem;
            margin: 15px 0 0 0;
            color: #DD0000;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Photo Grid Section */
        .container {
            max-width: 1100px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 2rem;
            text-transform: uppercase;
            margin-bottom: 30px;
            border-bottom: 5px solid var(--germany-red);
            display: inline-block;
            padding-bottom: 5px;
        }

        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        .player-card {
            background: var(--germany-black);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
            border-top: 4px solid var(--germany-red);
        }

        .player-card:hover {
            transform: translateY(-5px);
        }

        .player-info {
            padding: 30px 20px;
            color: white;
        }

        .player-name {
            font-size: 1.3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .player-pos {
            font-family: Arial, sans-serif;
            font-size: 0.95rem;
            color: var(--germany-gold);
            margin: 10px 0 0 0;
            font-weight: bold;
        }

        footer {
            font-family: Arial, sans-serif;
            margin-top: 80px;
            padding: 30px;
            background-color: #eee;
            font-size: 0.9rem;
            color: #666;
        }

        @media (max-width: 600px) {
            .support-banner h1 { font-size: 2.2rem; }
            .support-banner p { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="flag-bar">
        <div class="bar-black"></div>
        <div class="bar-red"></div>
        <div class="bar-gold"></div>
    </div>

    <header class="support-banner">
        <h1>I SUPPORT <span>GERMANY</span> 🇩🇪</h1>
        <p>FOR THE 2026 FIFA WORLD CUP</p>
    </header>

    <div class="container">
        <h2 class="section-title">Key Players</h2>
        
        <div class="player-grid">
            
            <div class="player-card">
                <div class="player-info">
                    <p class="player-name">Manuel Neuer</p>
                    <p class="player-pos">Goalkeeper</p>
                </div>
            </div>

            <div class="player-card">
                <div class="player-info">
                    <p class="player-name">Kai Havertz</p>
                    <p class="player-pos">Forward</p>
                </div>
            </div>

            <div class="player-card">
                <div class="player-info">
                    <p class="player-name">Joshua Kimmich</p>
                    <p class="player-pos">Midfielder / Defender</p>
                </div>
            </div>

            <div class="player-card">
                <div class="player-info">
                    <p class="player-name">Antonio Rüdiger</p>
                    <p class="player-pos">Defender</p>
                </div>
            </div>

        </div>
    </div>

    <footer>
        <p>Made by a proud Germany Fan 🖤❤️💛 World Cup 2026</p>
    </footer>

</body>
</html>
